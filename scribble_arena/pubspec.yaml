name: scribble_arena
description: A multiplayer drawing game inspired by Skribbl.io
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3

  # Google Sign In
  google_sign_in: ^6.2.1

  # Networking & Realtime
  socket_io_client: ^3.0.2
  dio: ^5.7.0

  # Navigation
  go_router: ^14.6.1

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  percent_indicator: ^4.2.3

  # Local Storage
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  logger: ^2.4.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  connectivity_plus: ^6.1.0
  package_info_plus: ^8.1.1
  share_plus: ^10.1.2
  vibration: ^2.0.0

  # Image & Drawing
  image_picker: ^1.1.2
  flutter_colorpicker: ^1.1.0
  perfect_freehand: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
